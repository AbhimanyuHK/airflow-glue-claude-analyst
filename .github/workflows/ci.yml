name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: test-key
          SLACK_BOT_TOKEN: xoxb-test
          SLACK_APP_TOKEN: xapp-test
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t airflow-glue-claude-analyst:ci .

      - name: Verify image
        run: docker run --rm airflow-glue-claude-analyst:ci python -c "from src.bot import create_app; print('OK')"
        env:
          ANTHROPIC_API_KEY: test-key
          SLACK_BOT_TOKEN: xoxb-test
          SLACK_APP_TOKEN: xapp-test
          AWS_REGION: us-east-1
